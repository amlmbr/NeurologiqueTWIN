<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#0a0f1a"/>
  
  <!-- Brain outline with neural network -->
  <g stroke="#00d4ff" stroke-width="1.5" fill="none">
    <!-- Main brain shape -->
    <path d="M 20 22 Q 18 16 22 14 Q 26 12 30 14 Q 34 12 38 14 Q 42 16 44 22 Q 46 28 44 34 Q 42 40 38 44 Q 34 46 30 44 Q 26 46 22 44 Q 18 40 20 34 Q 18 28 20 22 Z" stroke-linecap="round"/>
    
    <!-- Neural connections -->
    <circle cx="24" cy="24" r="2" fill="#00d4ff"/>
    <circle cx="32" cy="20" r="2" fill="#00d4ff"/>
    <circle cx="40" cy="24" r="2" fill="#00d4ff"/>
    <circle cx="26" cy="32" r="2" fill="#00d4ff"/>
    <circle cx="32" cy="28" r="2" fill="#00d4ff"/>
    <circle cx="38" cy="32" r="2" fill="#00d4ff"/>
    <circle cx="28" cy="38" r="2" fill="#00d4ff"/>
    <circle cx="36" cy="38" r="2" fill="#00d4ff"/>
    
    <!-- Connection lines -->
    <line x1="24" y1="24" x2="32" y2="20" opacity="0.6"/>
    <line x1="32" y1="20" x2="40" y2="24" opacity="0.6"/>
    <line x1="24" y1="24" x2="26" y2="32" opacity="0.6"/>
    <line x1="32" y1="20" x2="32" y2="28" opacity="0.6"/>
    <line x1="40" y1="24" x2="38" y2="32" opacity="0.6"/>
    <line x1="26" y1="32" x2="32" y2="28" opacity="0.6"/>
    <line x1="32" y1="28" x2="38" y2="32" opacity="0.6"/>
    <line x1="26" y1="32" x2="28" y2="38" opacity="0.6"/>
    <line x1="38" y1="32" x2="36" y2="38" opacity="0.6"/>
  </g>
  
  <!-- EEG wave at bottom -->
  <path d="M 16 48 L 18 48 L 20 46 L 22 50 L 24 44 L 26 52 L 28 48 L 30 48 L 32 46 L 34 50 L 36 44 L 38 52 L 40 48 L 42 48 L 44 46 L 46 50 L 48 48" 
        stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.8" stroke-linecap="round"/>
</svg>
