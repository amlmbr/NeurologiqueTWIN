# ============================================================
# NeurologiqueTWIN — Docker Compose
# ============================================================
# One-command startup:
#   docker compose up --build
#
# Structure:
#   backend/   — FastAPI + ML/DL/NLP models + digital twin simulation
#   frontend/  — Next.js dashboard + model testing + NLP pages
# ============================================================

services:

  # ----------------------------------------------------------
  # Python / FastAPI backend
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: neurologiquetwin-backend
    ports:
      - "8000:8000"
    environment:
      - NEURO_RISK_THRESHOLD=0.75
      - NEURO_DEFAULT_MODEL=rp
      - HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Next.js frontend
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neurologiquetwin-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
